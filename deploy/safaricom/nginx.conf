# ============================================================
# NyumbaSync - Nginx Configuration (Safaricom Cloud VM)
# Serves the React frontend and proxies API calls to backend
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

# ── Frontend (app.nyumbasync.co.ke) ────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.nyumbasync.co.ke www.app.nyumbasync.co.ke;

    # Redirect HTTP → HTTPS (Certbot will add this automatically)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.nyumbasync.co.ke www.app.nyumbasync.co.ke;

    # TLS — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/app.nyumbasync.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nyumbasync.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/nyumbasync/frontend;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.nyumbasync.co.ke;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Cache static assets (hashed filenames from React build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache HTML (React's index.html)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # React Router — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Backend API (api.nyumbasync.co.ke) ─────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.nyumbasync.co.ke;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.nyumbasync.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.nyumbasync.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nyumbasync.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers for API
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy to Node.js backend container
    location / {
        # Rate limit API calls
        limit_req zone=api burst=50 nodelay;

        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";   # WebSocket support
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts (M-Pesa callbacks can be slow)
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout  60s;

        # Upload size (document uploads)
        client_max_body_size 10M;
    }

    # Stricter rate limit on auth endpoints
    location ~ ^/api/v1/auth/(login|signup|forgot-password) {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
