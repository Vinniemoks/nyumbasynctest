version: '3.9'

# ============================================================
# NyumbaSync - Production Docker Compose
# Used by both Safaricom Cloud VM and AWS EC2 deployments
# ============================================================

services:
  backend:
    image: ${IMAGE_NAME:-nyumbasync/backend}:${IMAGE_TAG:-latest}
    container_name: nyumbasync-backend
    restart: always
    ports:
      - "${DEPLOY_PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      - nyumbasync-net

  # Optional: Nginx sidecar for SSL termination when not using host Nginx
  # nginx:
  #   image: nginx:alpine
  #   container_name: nyumbasync-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #     - /opt/nyumbasync/frontend:/usr/share/nginx/html:ro
  #   depends_on:
  #     - backend
  #   networks:
  #     - nyumbasync-net

volumes:
  backend-uploads:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nyumbasync/uploads
  backend-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/nyumbasync/logs

networks:
  nyumbasync-net:
    driver: bridge
